# Changelog generation for marchat_flutter (git-cliff).
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

Narrative notes by release. Prebuilt APK and Windows zip: [GitHub Releases](https://github.com/Cod-e-Codes/marchat_flutter/releases).

Release numbers track the supported [marchat](https://github.com/Cod-e-Codes/marchat) server line (wire protocol). See [PROTOCOL.md](https://github.com/Cod-e-Codes/marchat/blob/main/PROTOCOL.md).

"""
body = """
{% if version -%}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}

**marchat server line:** {{ version | trim_start_matches(pat="v") }} (use a matching or newer marchat server build for full compatibility).

{% else -%}
## Unreleased

On **main** only; not yet published. Compare to the latest tag on [GitHub Releases](https://github.com/Cod-e-Codes/marchat_flutter/releases).

**Targets marchat v1.2.0** server line (marchat v1.2.0 is scheduled for release on the server repo; this client branch aligns with that protocol work).

{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.remote.username %} ([{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }})){% endif %}
{% endfor %}
{% endfor %}

"""
footer = """
---
Generated with [git-cliff](https://git-cliff.org). The **Update changelog** workflow refreshes this file on every push to `main`. Release notes on GitHub Releases use the same generator at tag time.
"""
trim = true
postprocessors = [
  { pattern = '<!-- generated by git-cliff -->', replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^Merge", skip = true },
  { message = "^chore: update changelog", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI" },
  { message = ".*", group = "Changes" },
]
commit_preprocessors = [
  { pattern = 'Merge pull request #', skip = true },
  { pattern = 'Merge branch ', skip = true },
  { pattern = 'Merge remote-tracking branch', skip = true },
  { pattern = 'chore: update changelog', skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "Cod-e-Codes"
repo = "marchat_flutter"
