# Build release artifacts and publish a GitHub Release when a v* tag is pushed.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name != 'workflow_dispatch' && github.ref || '' }}

      - name: Resolve version
        id: meta
        env:
          DISPATCH_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
            if ! [[ "$TAG" =~ ^v[0-9][0-9A-Za-z0-9._+-]*$ ]]; then
              echo "::error::Tag must match v<version> (example: v1.2.0)."
              exit 1
            fi
            git rev-parse --verify "refs/tags/${TAG}^{commit}" >/dev/null
            git checkout --force "$TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          version: v2.13.1
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Regenerate full changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          version: v2.13.1
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Upload metadata artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: |
            release-notes.md
            CHANGELOG.md
          retention-days: 7

  build-android:
    name: Build Android APK
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Android licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Build release APK
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
        run: |
          flutter build apk --release \
            --build-name="$BUILD_VERSION" \
            --build-number="$BUILD_NUMBER"

      - name: Rename APK
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "marchat-flutter-${BUILD_VERSION}-android.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: marchat-flutter-${{ needs.prepare.outputs.version }}-android.apk
          retention-days: 7

  build-windows:
    name: Build Windows zip
    needs: [prepare]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
        run: |
          flutter build windows --release `
            --build-name="$env:BUILD_VERSION" `
            --build-number="$env:BUILD_NUMBER"

      - name: Package Windows zip
        shell: pwsh
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $version = $env:BUILD_VERSION
          $zip = "marchat-flutter-$version-windows-x64.zip"
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { throw "Missing $src" }
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-zip
          path: marchat-flutter-${{ needs.prepare.outputs.version }}-windows-x64.zip
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [prepare, build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*'
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: marchat_flutter ${{ needs.prepare.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            dist/marchat-flutter-${{ needs.prepare.outputs.version }}-android.apk
            dist/marchat-flutter-${{ needs.prepare.outputs.version }}-windows-x64.zip
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}

      - name: Download changelog for main branch
        if: github.event_name == 'push'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: changelog-update

      - name: Update CHANGELOG on main
        if: github.event_name == 'push'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: main

      - name: Commit changelog for release
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          cp changelog-update/CHANGELOG.md CHANGELOG.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to push."
            exit 0
          fi
          git commit -m "chore: update changelog for ${RELEASE_TAG} [skip ci]"
          git push
